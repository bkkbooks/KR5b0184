front:
  text: 玄靈轉經午朝行道儀
  hash: sha256:cec2ac8f887719c22883b23778aeaf40575b661ba038856a1fbe1864994555b4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0184_HFL_000-001a, image: hfl/0267/0267-045.png}
body:
  text: 法事如式各禮師存念如法請宣神呪太上玄一九皇吐精三五七變洞觀幽冥日月垂光下徹神庭俠照六合太一皇寧帝君金闕金書不傾五老奉符天地同成使我不惑以致真靈却遏萬邪禍害咸平上朝天皇還老返嬰大帝有制百神敬聽鳴法鼓二十四通無上三天玄元始三氣太上老君召出臣身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝顯服冠帶垂纓關啓玄壇土地方域神真臣今午景升壇行道朝謁帝真欽奉其諸丹悃具載緘謄願得太上至真道氣靈寶瑞光下降流入臣等身中令臣所啓之誠速逹徑御至真無極大道三清上聖紫微北極大帝北斗九皇星君御前請稱法位具位臣姓某與臨壇官衆等謹同誠上啓太上無極大道斗極祖師元始天尊斗極玄師靈寶天尊斗極宗師道德天尊昊天玉皇上帝紫微天皇大帝北極紫微大帝斗中高上玉皇尊星君太微玉帝北極玄卿大帝君北斗天英貪狼太星君北斗天任巨門元星君北斗天樞祿存真星君北斗天心文曲紐星君北斗天禽廉貞綱星君北斗天輔武曲紀星君北斗天衝破軍關星君北斗洞明左輔星君北斗隱光右弼星君九皇夫人九隂內妃天罡萬真節度奎光帝君斗中三台華蓋星君當生本命星君南極老人壽德星君上清福德星君上清祿德星君帝座照臨星宰二十八宿星君六十甲子星君道德玄曹官君聖衆玄中大法師真君三天大法師真君中天九省諸相丈人左右繡衣使者四直玉文功曹通事含人斗中千乘萬騎一切真靈恭望洪慈洞回昭鑒臣聞十政儲精一元肇象虛無妙氣生神寶於赤明圎滿化身說真經於永壽為衆生而設教仰大聖以通靈惟隂陽妙斡於權衡而禍福悉由於主宰臣等右壇綴武左籍登名期翊贊於真風庸開明於慧日踊躍修奉誓願流行以今欽奉綸音崇修金籙臣等恪遵妙訓夙奉明科酌水獻花建瑶壇而請命延生注福扣玉闕以馳神諒葑菲之不遺監葵藿之有造以今午朝升壇行道請法衆等運兹初捻上香願此香煙騰空徑上供養無上至真道寶大羅元始天尊紫微上宫天皇大帝玉斗二帝九皇星君清微天宮真仙聖衆臣等皈身皈神皈命首體投地仰依太上三尊十方衆聖願以是香功德上祝皇帝陛下伏願道契兩儀德涵四象常清常靜八荒宣玉燭之和同軌同文六合慶金穰之瑞今故燒香自皈依師尊大聖衆至真之德得道之後保天長存和與道合真以今午朝升壇行道請法衆等運兹二捻上香願此香煙騰空徑上供養至真無上經寶玉宸道君靈寶天尊紫微中宮北極大帝當生本命元辰星君帝座照臨星宰禹餘天宮真仙聖衆臣等皈身皈神皈命首體投地仰依太上三尊十方衆聖願以是香功德上祝皇太子殿下伏願膏沐太和涵濡景運龍墀日永來浩浩之福源鶴禁春融集穰穰之喜氣今故燒香自皈依師尊大聖衆至真之德得道之後保天長存和與道合真以今午朝升壇行道請法衆等運兹三捻上香願此香煙騰空徑上供養至真無上師寶五靈玄老道德天尊南極老人壽德星君上清福德星君上清祿德星君大赤天宮真仙聖衆臣等皈身皈神皈命首體投地仰依太上三尊十方衆聖願以是香功德歸流九州四海萬姓三農伏願神風披冒愛日薰陶老安少懷田野被無為之化耕食鑿飲里閭歌有道之長今故燒香自皈依師尊大聖衆至真之德得道之後永保長存和與道合真三皈依經心開悟解受持讀誦志心皈依十方道寶當願衆生起心回向一切信禮師普上法橋無有障礙宿命贊臣等謹按經云三元八節本命元辰北斗下日嚴置壇場轉經齊醮依儀行道其福無邊以今欽奉綸音崇修金籙祝壽延禧臣等謹率在壇清衆轉誦太上玄靈北斗本命延生真經各一過上祝中天大聖第四遊擊府天心文曲玉晨君乞為削落西北乾位六白陬訾降婁分野一切之厄仰希矜軫俯賜允俞臣等不勝激切之至修行經法敷座贊題經誦經畢解座贊臣向來祗率清衆升壇行道上祝聖壽萬安轉誦太上玄靈北斗本命延生真經各一過並巳周圎恭望福夀資命善果臻身人各運誠旋行讃詠步虛引至西北方上香旋行復位七元䨱護天尊臣等謹按經云可以酌水獻花冥心望北極稽首禮拜念本命真君名號亦不虛過本命限期皆得延生注福繫係人身災厄蠲除獲福無量以今欽奉綸音崇修金籙祝夀延禧臣等謹率在壇清衆轉誦太上玄靈北斗本命延生真經各一過上祝中天大聖第五斗君府天禽廉貞玉晨君乞為削落申宮五黃分野一切之厄仰希矜軫俯賜允俞臣等不勝激切之至修行經法敷座贊題經誦經畢解座贊臣等向來祗率清衆升壇行道上祝聖夀萬安轉誦太上玄靈北斗本命延生真經各一過並巳周圓恭望福夀資命善果臻身人各運誠旋行讃詠步虛引至申宮上香旋行復位大慈延夀天尊臣等謹按經云於是真君名號不可得聞凡有見聞能持誦者皆道心深重宿有善緣其功德力莫可稱量以今欽奉綸音崇修金籙祝壽延禧臣等謹率在壇清衆轉誦太上玄靈北斗本命延生真經各一過上祝中天大聖第六太常府天輔武曲玉晨君乞為削落東南巽位四碧夀星鶉首分野一切之厄仰希矜軫俯賜允俞臣等不勝激切之至修行經法敷座贊題經誦經畢解座贊臣等向來祗率清衆升壇行道上祝聖夀萬安轉誦太上玄靈北斗本命延生真經各一過並巳周圓恭望福壽資命善果臻身人各運誠旋行讃詠步虛引至東南方上香旋行復位三聞經天長地久海晏河清聞經巳後當願聖夀萬安皇圖鞏固金枝蕃衍寶曆綿洪發願存神燒香香官使者左右龍虎君侍香諸靈官當令臣向來午朝轉經行道之所自然生金液丹碧芝英百靈衆真交㑹在此香火爐前當願丹誠感格鴻貺潜敷聖夀萬安皇圖永固十方仙童玉女接侍蘭煙傳臣向來所奏之誠速逹徑御至真無極大道三清上聖紫微北極大帝北斗九皇星君御前出堂頌玄靈轉經午朝行道儀
